<!DOCTYPE html>
<html lang="en">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="icon" href="thedatapilot_logo.png" type="image/png">
   <title>Services | The Data Pilot</title>
   <script src="https://cdn.tailwindcss.com"></script>
   <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
   <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
   <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
   <script src="https://unpkg.com/lucide@latest"></script>
   <script src="core-layout.js?v=2.0.10" type="text/babel"></script>
   <style>
       @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
       body { font-family: 'Inter', sans-serif; color: #334155; }
       @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
       @keyframes spin-reverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
       .gear-large { animation: spin 8s linear infinite; transform-origin: center; }
       .gear-small { animation: spin-reverse 4s linear infinite; transform-origin: center; }
   </style>
</head>
<body class="bg-white">
   <div id="root"></div>
   <script type="text/babel">
       const { useState, useEffect } = React;

       const InternalEmergencyUI = ({ errorMsg }) => (
            <div style={{height: '100vh', width: '100vw', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '24px', backgroundColor: '#f8fafc', textAlign: 'center'}}>
                <div style={{maxWidth: '448px', width: '100%'}}>
                    <div style={{display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '12px', marginBottom: '28px'}}>
                        <div style={{width: '52px', height: '52px', backgroundColor: '#06b6d4', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0}}>
                            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                        </div>
                        <div style={{display: 'flex', flexDirection: 'column', textAlign: 'left', lineHeight: '1'}}>
                            <span style={{fontWeight: '800', fontSize: '22px', color: '#0f172a', marginBottom: '4px'}}>The Data Pilot</span>
                            <span style={{fontSize: '13px', fontWeight: '600', color: '#06b6d4'}}>Logic-First. AI-Fast.</span>
                        </div>
                    </div>
                    <div style={{backgroundColor: 'white', padding: '30px', borderRadius: '40px', border: '1px solid #e2e8f0', boxShadow: '0 20px 25px -5px rgba(0, 0, 0, 0.05)'}}>
                        <div style={{width: '100px', height: '80px', margin: '0 auto 32px auto', position: 'relative'}}>
                            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#06b6d4" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{position: 'absolute', top: 0, left: 0}} className="gear-large">
                                <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </div>
                        <h2 style={{fontWeight: '800', fontSize: '24px', margin: '0 0 12px 0', color: '#0f172a'}}>{errorMsg.includes("timeout") ? "Synchronizing Systems" : "System is temporarily down"}</h2>
                        <p style={{color: '#64748b', fontWeight: '500', marginBottom: '36px', lineHeight: '1.6', fontSize: '15px'}}>{errorMsg}</p>
                        <button onClick={() => window.location.reload()} style={{width: '100%', backgroundColor: '#06b6d4', color: 'white', padding: '22px', borderRadius: '16px', fontWeight: '800', fontSize: '15px', textTransform: 'uppercase', letterSpacing: '0.1em', border: 'none', cursor: 'pointer'}}>Check Connection</button>
                    </div>
                </div>
            </div>
       );

       const App = () => {
           const [isLoaded, setIsLoaded] = useState(false);
           const [error, setError] = useState(null);

           useEffect(() => {
               const handleSync = () => {
                   if (window.SITE_DATA && (window.SITE_DATA.isLoaded || window.SITE_DATA.error)) {
                       if (window.SITE_DATA.error) setError(window.SITE_DATA.error);
                       setIsLoaded(true);
                   }
               };
               window.addEventListener('siteDataLoaded', handleSync);
               if (window.SITE_DATA && (window.SITE_DATA.isLoaded || window.SITE_DATA.error)) handleSync();
               const timer = setTimeout(() => { if (!window.SITE_DATA?.isLoaded) setError("Loading pilot services..."); }, 6000);
               return () => { window.removeEventListener('siteDataLoaded', handleSync); clearTimeout(timer); };
           }, []);

           if (error) return window.EmergencyUI ? <window.EmergencyUI error={error} /> : <InternalEmergencyUI errorMsg={error} />;
           if (!isLoaded) return null;

           const { services } = window.SITE_DATA;

           return (
               <div className="min-h-screen text-slate-800 animate-in fade-in duration-700">
                   <window.Navbar />
                   <header class="pt-48 pb-20 px-6 bg-slate-50/50">
                       <div class="max-w-4xl mx-auto text-center">
                           <h1 class="text-4xl md:text-5xl font-extrabold text-slate-900 mb-6">Expert Services</h1>
                           <p class="text-lg text-slate-500 font-medium leading-relaxed">
                               Professional consulting and training designed for corporate teams and high-level strategy.
                           </p>
                       </div>
                   </header>
                   <main class="py-20 px-6 max-w-7xl mx-auto">
                       <div className="grid md:grid-cols-3 gap-8">
                           {services.items.map(service => (
                               <div key={service.id} className="bg-slate-900 text-white rounded-[2rem] p-10 flex flex-col hover:scale-[1.02] transition-all">
                                   <div className="inline-block bg-cyan-500 text-slate-900 px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest w-fit mb-8">
                                       {service.category}
                                   </div>
                                   <h3 className="text-2xl font-bold mb-6">{service.title}</h3>
                                   <p className="text-slate-400 font-medium leading-relaxed mb-10">{service.description}</p>
                                   <button className="w-full bg-white text-slate-900 py-4 rounded-xl font-black text-xs uppercase tracking-widest hover:bg-cyan-500 transition-colors mt-auto">
                                       {service.cta}
                                   </button>
                               </div>
                           ))}
                       </div>
                   </main>
                   <window.Footer />
               </div>
           );
       };

       const root = ReactDOM.createRoot(document.getElementById('root'));
       root.render(<App />);
   </script>
</body>
</html>
