   <style>

       .dropdown-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1); }
       
       @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
       @keyframes spin-reverse { 0% { transform: rotate(360deg); } 100% { transform: rotate(0deg); } }
       .gear-large { animation: spin 8s linear infinite; transform-origin: center; }
       .gear-small { animation: spin-reverse 4s linear infinite; transform-origin: center; }
   </style>
</head>
<body class="bg-white">
   <div id="root">

            <div style="max-width: 448px; width: 100%;">
                <div style="display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 28px;">
                    <div style="width: 52px; height: 52px; background-color: var(--brand-500); border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.2);">
                        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                    </div>
                    <div style="display: flex; flex-direction: column; text-align: left; line-height: 1;">
                        <span style="font-weight: 800; font-size: 22px; color: #0f172a; margin-bottom: 4px;">The Data Pilot</span>
                        <span style="font-size: 13px; font-weight: 600; color: var(--brand-500);">Logic-First. AI-Fast.</span>
                    </div>
                </div>
                <div style="background-color: white; padding: 30px; border-radius: 40px; border: 1px solid #e2e8f0; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);">
                    <div style="width: 100px; height: 80px; margin: 0 auto 32px auto; position: relative;">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--brand-500)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; top: 0; left: 0;" class="gear-large">
                            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                        <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="var(--brand-500)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="position: absolute; bottom: 0; right: 0;" class="gear-small">
                            <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                        </svg>
                    </div>
                    <h2 style="font-weight: 800; font-size: 24px; margin-bottom: 12px; color: #0f172a;">System is temporarily down</h2>
                    <p style="color: #64748b; font-weight: 500; margin-bottom: 36px; line-height: 1.6; font-size: 15px;">
                        We are working on it and will be back online shortly
                    </p>
                    <button onclick="window.location.reload()" style="width: 100%; background-color: var(--brand-500); color: white; padding: 22px; border-radius: 16px; font-weight: 800; font-size: 15px; text-transform: uppercase; letter-spacing: 0.1em; border: none; cursor: pointer; box-shadow: 0 10px 15px -3px rgba(6, 182, 212, 0.3);">
                        Check Connection
                    </button>
                </div>
                <p style="margin-top: 18px; font-size: 12px; font-weight: 700; color: #94a3b8; letter-spacing: 0.05em;">Commitment to world-class data services and mentorship</p>
            </div>
        </div>
   </div>

   <script type="text/babel">
       const { useState, useEffect } = React;

       const App = () => {
           const [isLoaded, setIsLoaded] = useState(false);
           const [error, setError] = useState(null);
           const [activeProgramId, setActiveProgramId] = useState('ada');
           const [activeModuleIdx, setActiveModuleIdx] = useState(0);
           const [promoCode, setPromoCode] = useState('');
           const [displayPrice, setDisplayPrice] = useState(0);
           const [formData, setFormData] = useState({ full_name: '', email: '', phone: '' });
           const [isSubmitting, setIsSubmitting] = useState(false);

           useEffect(() => {
               const handleSync = () => {
                   if (window.SITE_DATA && window.SITE_DATA.isLoaded) {
                       const currentProg = window.SITE_DATA.programs[activeProgramId];
                       if (currentProg) {
                           setDisplayPrice(currentProg.price);
                           setIsLoaded(true);
                           setError(null);
                       }
                   }
               };
               window.addEventListener('siteDataLoaded', handleSync);
               if (window.SITE_DATA && window.SITE_DATA.isLoaded) handleSync();

               // Emergency Timeout: If data doesn't load in 6 seconds, show the error state
               const timer = setTimeout(() => {
                   if (!window.SITE_DATA?.isLoaded) {
                       setError("Connection timeout. Please verify your data folder path.");
                   }
               }, 6000);

               return () => {
                   window.removeEventListener('siteDataLoaded', handleSync);
                   clearTimeout(timer);
               };
           }, [activeProgramId]);

           const handleSubmit = async (e) => {
               e.preventDefault();
               setIsSubmitting(true);
               const data = new FormData();
               Object.keys(formData).forEach(key => data.append(key, formData[key]));
               try {
                   const res = await fetch('submit.php', { method: 'POST', body: data });
                   const result = await res.json();
                   if(result.status === 'success') {
                       alert("Application Submitted! Check your email for confirmation.");
                       setFormData({ full_name: '', email: '', phone: '' });
                   } else { alert("Error: " + result.message); }
               } catch (err) { alert("Connection error. Check your submit.php file."); }
               finally { setIsSubmitting(false); }
           };

           const handleApplyPromo = () => {
               if (promoCode.toUpperCase() === 'PILOT10') {
                   const originalPrice = window.SITE_DATA.programs[activeProgramId].price;
                   setDisplayPrice(originalPrice * 0.9);
                   alert("Promo Code Applied!");
               } else { alert("Invalid Promo Code."); }
           };

           // --- INTEGRATED FALLBACK UI IN REACT ---
           // This prevents the "blank page" by making React render the fallback UI 
           // while it is still waiting for data.
           if (!isLoaded || error) {
               return (
                    <div style={{height: '100vh', width: '100vw', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '24px', backgroundColor: '#f8fafc', textAlign: 'center'}}>
                        <div style={{maxWidth: '448px', width: '100%'}}>
                            <div style={{display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '12px', marginBottom: '28px'}}>
                                <div style={{width: '52px', height: '52px', backgroundColor: 'var(--brand-500)', borderRadius: '8px', display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, boxShadow: '0 10px 15px -3px rgba(6, 182, 212, 0.2)'}}>
                                    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                                </div>
                                <div style={{display: 'flex', flexDirection: 'column', textAlign: 'left', lineHeight: '1'}}>
                                    <span style={{fontWeight: '800', fontSize: '22px', color: '#0f172a', marginBottom: '4px'}}>The Data Pilot</span>
                                    <span style={{fontSize: '13px', fontWeight: '600', color: 'var(--brand-500)'}}>Logic-First. AI-Fast.</span>
                                </div>
                            </div>
                            <div style={{backgroundColor: 'white', padding: '30px', borderRadius: '40px', border: '1px solid #e2e8f0', boxShadow: '0 20px 25px -5px rgba(0, 0, 0, 0.05)'}}>
                                <div style={{width: '100px', height: '80px', margin: '0 auto 32px auto', position: 'relative'}}>
                                    <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--brand-500)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{position: 'absolute', top: 0, left: 0}} className="gear-large">
                                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/>
                                    </svg>
                                    <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="var(--brand-500)" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{position: 'absolute', bottom: 0, right: 0}} className="gear-small">
                                        <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
                                    </svg>
                                </div>
                                <h2 style={{fontWeight: '800', fontSize: '24px', marginBottom: '12px', color: '#0f172a'}}>System is temporarily down</h2>
                                <p style={{color: '#64748b', fontWeight: '500', marginBottom: '36px', lineHeight: '1.6', fontSize: '15px'}}>
                                    {error || "We are working on it and will be back online shortly"}
                                </p>
                                <button onClick={() => window.location.reload()} style={{width: '100%', backgroundColor: 'var(--brand-500)', color: 'white', padding: '22px', borderRadius: '16px', fontWeight: '800', fontSize: '15px', textTransform: 'uppercase', letterSpacing: '0.1em', border: 'none', cursor: 'pointer', boxShadow: '0 10px 15px -3px rgba(6, 182, 212, 0.3)'}}>
                                    Check Connection
                                </button>
                            </div>
                            <p style={{marginTop: '18px', fontSize: '12px', fontWeight: '700', color: '#94a3b8', letterSpacing: '0.05em'}}>Commitment to world-class data services and mentorship</p>
                        </div>
                    </div>
               );
           }

           const { settings, programs, media } = window.SITE_DATA;
           const currentProgram = programs[activeProgramId];

           // Tools array strictly from v1.3 design
           const tools = [
               { name: 'Excel', icon: 'file-spreadsheet', color: 'bg-green-50', iconColor: 'text-green-600' },
               { name: 'SQL Server', icon: 'database', color: 'bg-cyan-50', iconColor: 'text-cyan-600' },
               { name: 'Python', icon: 'terminal', color: 'bg-yellow-50', iconColor: 'text-yellow-600' },
               { name: 'Power BI', icon: 'bar-chart-3', color: 'bg-amber-50', iconColor: 'text-amber-600' },
               { name: 'Tableau', icon: 'layout', color: 'bg-cyan-50', iconColor: 'text-cyan-600' },
               { name: 'AI Ready (LLMs)', icon: 'cpu', color: 'bg-indigo-50', iconColor: 'text-indigo-600' },
               { name: 'Warehousing', icon: 'layers', color: 'bg-slate-50', iconColor: 'text-slate-600' },
               { name: 'Statistics', icon: 'microscope', color: 'bg-rose-50', iconColor: 'text-rose-600' }
           ];

           return (
               <div className="min-h-screen">
                   {/* SHARED TACTICAL NAVBAR */}
                   <Navbar activeProgramId={activeProgramId} onProgramChange={(id) => { setActiveProgramId(id); setActiveModuleIdx(0); }} />

                   {/* SUB NAV (SYLLABUS BAR) */}
                   <div className="fixed top-20 w-full z-40 bg-slate-50 border-b border-slate-200 hidden md:block">
                       <div className="max-w-5xl mx-auto flex justify-between px-4">
                           {['About', 'Syllabus', 'Tools', 'Projects', 'Videos', 'Eligibility', 'Fees'].map((tab) => (
                               <a key={tab} href={`#${tab.toLowerCase()}`} className="py-4 text-sm font-bold text-slate-500 hover:text-cyan-500 border-b-2 border-transparent hover:border-cyan-500 transition-all">
                                   {tab}
                               </a>
                           ))}
                       </div>
                   </div>

                   {/* HERO SECTION */}
                   <header id="about" className="pt-48 pb-24 px-6 bg-slate-50/50">
                       <div className="max-w-7xl mx-auto grid lg:grid-cols-[1.1fr_0.9fr] gap-16 items-center">
                           <div className="space-y-8 text-center lg:text-left">
                               <div className="inline-block bg-cyan-50 text-cyan-600 px-4 py-1 rounded text-xs font-bold uppercase tracking-wider">
                                   Job-Ready Certification Program
                               </div>
                               <h1 className="text-4xl md:text-5xl font-extrabold leading-tight text-slate-900">
                                   Certification in <span className="text-cyan-500">{currentProgram.title}</span>
                               </h1>
                               <p className="text-lg text-slate-500 max-w-xl font-medium leading-relaxed mx-auto lg:mx-0">
                                   Master Data Warehousing, SQL, and Python with an AI-Ready approach. Get comprehensive career assistance and learn via <strong>Live Instructor-Led</strong> training from industry veterans at <strong>thedatapilot.in</strong>.
                               </p>
                               <div className="space-y-4 max-w-lg mx-auto lg:mx-0 text-left">
                                   <div className="flex items-center space-x-3 text-sm font-semibold text-slate-700">
                                       <Icon name="video" size={18} className="text-cyan-500" />
                                       <span>Live Instructor-Led Virtual Classrooms</span>
                                   </div>
                                   <div className="flex items-center space-x-3 text-sm font-semibold text-slate-700">
                                       <Icon name="check-circle" size={18} className="text-cyan-500" />
                                       <span>Job Assistance provided for all eligible candidates</span>
                                   </div>
                                   <div className="flex items-center space-x-3 text-sm font-semibold text-slate-700">
                                       <Icon name="check-circle" size={18} className="text-cyan-500" />
                                       <span>12+ Industry First Projects and Case Studies</span>
                                   </div>
                               </div>
                               <div className="pt-4 flex justify-center lg:justify-start items-center gap-6">
                                   <a href="#syllabus" className="bg-slate-900 text-white px-8 py-4 rounded font-bold hover:bg-cyan-500 transition-all uppercase tracking-widest text-sm">Explore Course</a>
                                   <button className="text-slate-900 font-bold underline underline-offset-4 decoration-2">Download Brochure</button>
                               </div>
                           </div>

                           {/* ADMISSION FORM */}
                           <div className="bg-white p-8 border border-slate-100 rounded-lg max-w-md ml-auto w-full shadow-lg">
                               <h3 className="text-xl font-bold mb-2 text-slate-900">Begin Your Journey</h3>
                               <p className="text-sm text-slate-400 mb-6 font-medium italic">Verify your enrollment eligibility below.</p>
                               <form className="space-y-4" onSubmit={handleSubmit}>
                                   <input type="text" placeholder="Full Name" required value={formData.full_name} onChange={e => setFormData({...formData, full_name: e.target.value})} className="w-full p-4 border border-slate-100 bg-slate-50 rounded text-sm focus:border-cyan-500 outline-none font-medium" />
                                   <input type="email" placeholder="Email Address" required value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="w-full p-4 border border-slate-100 bg-slate-50 rounded text-sm focus:border-cyan-500 outline-none font-medium" />
                                   <input type="tel" placeholder="Mobile Number" required maxLength="10" value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="w-full p-4 border border-slate-100 bg-slate-50 rounded text-sm focus:border-cyan-500 outline-none font-medium" />
                                   <button type="submit" disabled={isSubmitting} className="w-full bg-cyan-500 text-white py-4 rounded font-bold text-sm uppercase tracking-widest hover:bg-cyan-600 transition-all shadow-lg">{isSubmitting ? 'Processing...' : 'Apply for Admission'}</button>
                               </form>
                           </div>
                       </div>
                   </header>

                   {/* SYLLABUS SECTION */}
                   <section id="syllabus" className="py-24 px-6 bg-white border-y border-slate-200">
                       <div className="max-w-7xl mx-auto">
                           <h2 className="text-3xl font-extrabold text-center mb-16 text-slate-900 tracking-tight">Job-Ready Data Analytics Curriculum</h2>
                           <div className="flex flex-col lg:flex-row gap-6 min-h-[600px]">
                               <div className="lg:w-1/3 flex flex-col space-y-3">
                                   {currentProgram.syllabus.map((mod, idx) => (
                                       <button key={idx} onClick={() => setActiveModuleIdx(idx)} className={`p-6 text-left rounded-xl transition-all border font-semibold flex items-center justify-between group ${activeModuleIdx === idx ? 'bg-cyan-500 border-cyan-500 text-white' : 'bg-white border-slate-100 text-slate-600 hover:border-cyan-200'}`}>
                                           <span className="text-md">{idx + 1}. {mod.title}</span>
                                           <Icon name="chevron-right" size={16} className={`transition-transform ${activeModuleIdx === idx ? 'translate-x-1 opacity-100' : 'opacity-0'}`} />
                                       </button>
                                   ))}
                               </div>
                               <div className="lg:w-2/3 bg-white p-10 rounded-2xl border border-slate-200 flex flex-col shadow-sm">
                                   <div className="mb-8 pb-6 border-b border-slate-50 flex flex-col md:flex-row md:items-start justify-between gap-4">
                                       <div className="space-y-1">
                                           <span className="text-cyan-500 font-bold uppercase text-[11px] tracking-widest">Module 0{activeModuleIdx + 1}</span>
                                           <h3 className="text-2xl font-bold text-slate-900 mt-1 uppercase tracking-tight">{currentProgram.syllabus[activeModuleIdx].title}</h3>
                                           <div className="flex items-center gap-2 mt-2">
                                               <Icon name="play-circle" size={18} className="text-cyan-500" />
                                               <span className="text-xs font-bold text-slate-400 uppercase tracking-tighter">Live: {currentProgram.syllabus[activeModuleIdx].lectures} Lectures • {currentProgram.syllabus[activeModuleIdx].hours} Hours</span>
                                           </div>
                                       </div>
                                       <button className="flex items-center space-x-2 bg-cyan-500 text-white px-5 py-2.5 rounded-lg text-xs font-bold uppercase tracking-widest self-start hover:bg-cyan-600 transition-all shadow-md">
                                           <Icon name="download" size={14} /><span>Download Brochure</span>
                                       </button>
                                   </div>
                                   <div className="flex-grow overflow-y-auto custom-scrollbar pr-4">
                                       <div className="grid md:grid-cols-2 gap-x-10 gap-y-4">
                                           {currentProgram.syllabus[activeModuleIdx].content.map((bullet, i) => (
                                               <div key={i} className="flex items-start space-x-3 group">
                                                   <Icon name="check-circle" size={14} className="text-cyan-400 mt-1 flex-shrink-0" />
                                                   <span className="text-[14px] font-medium text-slate-500 leading-tight group-hover:text-slate-900 transition-colors">{bullet}</span>
                                               </div>
                                           ))}
                                       </div>
                                   </div>
                                   <div className="mt-8 pt-6 border-t border-slate-50 flex items-center justify-between text-[10px] font-bold uppercase tracking-widest">
                                       <div className="flex items-center space-x-2 text-slate-400">
                                           <Icon name="layers" size={16} /><span>Industry First Curriculum</span>
                                       </div>
                                       <div className="flex items-center space-x-2 text-cyan-500/80">
                                           <Icon name="cpu" size={16} /><span className="italic">AI Powered Workflow</span>
                                       </div>
                                   </div>
                               </div>
                           </div>
                       </div>
                   </section>

                   {/* TOOLS SECTION */}
                   <section id="tools" className="py-24 px-6 bg-white">
                       <div className="max-w-7xl mx-auto text-center">
                           <h2 className="text-3xl font-bold mb-16 text-slate-900 uppercase tracking-tight">Modern Industry Tool Stack</h2>
                           <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                               {tools.map((tool, i) => (
                                   <div key={i} className={`${tool.color} tool-card p-12 flex flex-col items-center justify-center space-y-5 border border-slate-50 shadow-sm`}>
                                       <Icon name={tool.icon} size={56} className={tool.iconColor} />
                                       <span className="font-bold text-slate-700 uppercase tracking-widest text-xs">{tool.name}</span>
                                   </div>
                               ))}
                           </div>
                       </div>
                   </section>

                   {/* PROJECTS SECTION */}
                   <section id="projects" className="py-24 px-6 bg-slate-50">
                       <div className="max-w-7xl mx-auto text-center">
                           <h2 className="text-3xl font-bold mb-16 text-slate-900 uppercase tracking-tight">Real-Time Industry Projects</h2>
                           <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-8 text-left">
                               {media.projects.map((proj) => (
                                   <div key={proj.id} className="bg-white rounded-xl overflow-hidden border border-slate-200 group">
                                       <div className="aspect-video bg-slate-100 flex items-center justify-center relative overflow-hidden">
                                           <img src={proj.img} alt={proj.title} className="absolute inset-0 w-full h-full object-cover" onError={e => e.target.style.display='none'} />
                                           <Icon name="image" size={32} className="opacity-20 absolute" />
                                       </div>
                                       <div className="p-6">
                                           <h4 className="font-bold text-slate-800">{proj.title}</h4>
                                       </div>
                                   </div>
                               ))}
                           </div>
                       </div>
                   </section>

                   {/* VIDEOS SECTION */}
                   <section id="videos" className="py-24 px-6 bg-white">
                        <div className="max-w-7xl mx-auto">
                            <h2 className="text-3xl font-bold text-slate-900 uppercase tracking-tight mb-12">Program Overview & Demos</h2>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                                {media.videos.map((vid, i) => (
                                    <div key={i} className="aspect-video bg-slate-100 rounded-xl flex items-center justify-center group cursor-pointer relative overflow-hidden border border-slate-200 shadow-sm">
                                        <div className="absolute inset-0 bg-slate-900/5 group-hover:bg-slate-900/10 transition-all"></div>
                                        <Icon name="play" size={40} className="text-cyan-500 opacity-80 group-hover:scale-110 transition-all z-10" />
                                        <div className="absolute bottom-4 left-4 text-slate-900 font-bold text-[10px] uppercase tracking-wider z-10">{vid.title}</div>
                                    </div>
                                ))}
                            </div>
                        </div>
                   </section>

                   {/* ELIGIBILITY SECTION */}
                   <section id="eligibility" className="py-24 px-6 bg-white border-y border-slate-200">
                       <div className="max-w-7xl mx-auto grid lg:grid-cols-2 gap-16 items-center">
                           <div className="space-y-8 text-left">
                               <div className="space-y-4">
                                   <h2 className="text-3xl font-extrabold text-slate-900 uppercase tracking-tight">Check Your Eligibility</h2>
                                   <p className="text-slate-500 font-medium">This program is designed for ambitious learners ready to pivot into data.</p>
                               </div>
                               <div className="space-y-4">
                                   {["Final year students or graduates from any discipline.", "Working professionals looking for career acceleration.", "A basic understanding of logical reasoning.", "Commitment to 10-12 hours of weekly learning."].map((criteria, i) => (
                                       <div key={i} className="flex items-start space-x-4 p-4 rounded-xl bg-slate-50 border border-slate-100 font-bold text-slate-700 shadow-sm">
                                           <Icon name="check" size={20} className="text-cyan-500" />
                                           <span>{criteria}</span>
                                       </div>
                                   ))}
                               </div>
                           </div>
                           <div className="aspect-square bg-slate-50 border-2 border-dashed border-slate-200 rounded-3xl flex flex-col items-center justify-center text-slate-300">
                               <Icon name="user-check" size={64} className="opacity-10" />
                           </div>
                       </div>
                   </section>

                   {/* FEES SECTION */}
                   <section id="fees" className="py-28 px-6 bg-slate-50">
                       <div className="max-w-5xl mx-auto bg-white rounded-[3rem] border border-slate-200 overflow-hidden shadow-2xl grid md:grid-cols-2">
                           <div className="p-14 space-y-8 text-left">
                               <h3 className="text-3xl font-black tracking-tight text-slate-900 uppercase">Program Package</h3>
                               <div className="space-y-6">
                                   {currentProgram.highlights.map((t, i) => (
                                       <div key={i} className="flex items-center space-x-4 font-bold text-slate-600">
                                           <Icon name="check-circle" size={24} className="text-cyan-500 flex-shrink-0" />
                                           <span className="text-lg">{t}</span>
                                       </div>
                                   ))}
                               </div>
                           </div>
                           <div className="p-14 bg-slate-900 text-white text-center flex flex-col justify-center items-center space-y-8">
                               <div className="space-y-2">
                                   <span className="text-xs font-black uppercase tracking-[0.4em] text-cyan-400">Total Program Investment</span>
                                   <h3 className="text-7xl font-black tracking-tighter">₹{displayPrice.toLocaleString()}</h3>
                                   <p className="text-slate-400 text-xs font-bold uppercase tracking-widest mt-4">Net Inclusive Price</p>
                               </div>
                               <div className="w-full flex space-x-3">
                                   <input type="text" placeholder="Promo Code" value={promoCode} onChange={e => setPromoCode(e.target.value)} className="flex-grow p-4 bg-white/10 border border-white/20 rounded-2xl text-sm outline-none font-bold focus:bg-white/20 transition-all placeholder:text-slate-500" />
                                   <button onClick={handleApplyPromo} className="bg-cyan-500 px-6 py-4 rounded-2xl font-black text-xs uppercase hover:bg-cyan-600 transition-colors">Apply</button>
                               </div>
                               <button className="w-full bg-cyan-500 py-6 rounded-2xl font-black uppercase tracking-[0.2em] text-sm shadow-2xl hover:scale-[1.02] active:scale-95 transition-all">
                                   Apply & Pay Now
                               </button>
                           </div>
                       </div>
                   </section>

                   <Footer />
               </div>
           );
       };

       const root = ReactDOM.createRoot(document.getElementById('root'));
       root.render(<App />);
   </script>
</body>
</html>
